kind = "web"
previewPath = "/"
title = "Silas Security Ops"
version = "1.0.0"
id = "artifacts/silas-security"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21975

[services.development]
run = "pnpm --filter @workspace/silas-security run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/silas-security", "run", "build" ]
publicDir = "artifacts/silas-security/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21975"
BASE_PATH = "/"
